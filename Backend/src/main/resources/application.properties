spring.application.name=ai_api_testing_platform
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=update    
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
app.security.google.client-id=${GOOGLE_CLIENT_ID}
app.cors.allowed-origin-patterns=${CORS_ALLOWED_ORIGIN_PATTERNS}
spring.data.redis.host=${REDIS_HOST:}
spring.data.redis.port=${REDIS_PORT}
spring.cache.type=redis
app.ai.base-url=${AI_BASE_URL}
app.ai.model=${AI_MODEL}
app.ai.api-key=${AI_API_KEY}
app.ai.mock-enabled=${AI_MOCK_ENABLED}
app.ai.async.pool-size=${AI_ASYNC_POOL_SIZE:8}
app.rate-limit.ai.capacity=${AI_RATE_LIMIT_CAPACITY:60}
app.rate-limit.ai.refill-tokens=${AI_RATE_LIMIT_REFILL_TOKENS:60}
app.rate-limit.ai.refill-minutes=${AI_RATE_LIMIT_REFILL_MINUTES:1}
